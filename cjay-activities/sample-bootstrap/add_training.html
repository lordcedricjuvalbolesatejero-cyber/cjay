<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Training</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Body background */
        body {
            background-color: #dff5ec;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Container card */
        .container {
            max-width: 600px;
            margin-top: 50px;
            padding: 25px;
            border-radius: 12px;
            background: #f0fdf9;
            border: 1px solid rgba(16,185,129,0.3);
            box-shadow: 0 4px 15px rgba(16,185,129,0.15);
        }

        /* Header */
        #employeeName {
            color: #065f46;
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* Inputs */
        .form-control {
            background: #e6f6ed;
            border: 1.5px solid rgba(16,185,129,0.3);
            border-radius: 8px;
            color: #065f46;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: #d1f5e3;
            border-color: #10b981;
            box-shadow: 0 0 8px rgba(16,185,129,0.4);
            outline: none;
        }

        /* Buttons */
        .btn-success, .btn-secondary {
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-success {
            background: linear-gradient(135deg,#34d399,#10b981);
            border: none;
            color: #064e3b;
        }
        .btn-success:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(16,185,129,0.3);
        }
        .btn-secondary {
            background: linear-gradient(135deg,#d1d5db,#9ca3af);
            border: none;
            color: #1f2937;
        }
        .btn-secondary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(156,163,175,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h2 id="employeeName">Add Training</h2>
    <form id="trainingForm">
        <div class="mb-3">
            <label class="form-label">Training Title</label>
            <input type="text" class="form-control" id="titleInput" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Training Date</label>
            <input type="date" class="form-control" id="dateInput" required>
        </div>
        <button type="submit" class="btn btn-success me-2">Add Training</button>
        <button type="button" class="btn btn-secondary" id="backBtn">Back</button>
    </form>
</div>

<script>
// Get employee info from URL
const params = new URLSearchParams(window.location.search);
const empID = params.get("id");
const empName = decodeURIComponent(params.get("name") || "Unknown Employee");

if (!empID) {
    alert("Employee ID is missing!");
    window.location.href = "employee_list.html";
}

document.getElementById("employeeName").textContent = `Add Training for ${empName}`;

// Form submit
document.getElementById("trainingForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const title = document.getElementById("titleInput").value.trim();
    const date = document.getElementById("dateInput").value;
    
    if (!title || !date) return alert("Please fill all fields!");

    // Load existing trainings
    let trainingsData = JSON.parse(localStorage.getItem("trainings")) || {};
    if (!trainingsData[empID]) trainingsData[empID] = [];
    trainingsData[empID].push({ title, date });

    // Save to localStorage
    localStorage.setItem("trainings", JSON.stringify(trainingsData));

    // Redirect back to trainings page
    window.location.href = `trainings.html?id=${empID}&name=${encodeURIComponent(empName)}`;
});

// Back button
document.getElementById("backBtn").onclick = function() {
    window.location.href = `trainings.html?id=${empID}&name=${encodeURIComponent(empName)}`;
};
</script>

</body>
</html>
