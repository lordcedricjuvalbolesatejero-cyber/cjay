<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Modern Tint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>

<div class="login-box">
    <form id="loginForm">
        <div class="mb-3">
            <input type="text" id="username" class="form-control" placeholder="Username" required autocomplete="username">
        </div>
        <div class="mb-3">
            <input type="password" id="password" class="form-control" placeholder="Password" required autocomplete="current-password">
        </div>
        <div class="d-grid">
            <button type="submit" class="btn btn-it">Login</button>
        </div>
        <p id="errorMsg" class="text-danger mt-3 text-center small"></p>
    </form>
</div>

<!-- Activity Logger -->
<script src="./js/activity_logger.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim().toLowerCase();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("errorMsg");

    const validUsers = {
        "estilla": "12345",
        "marvin": "marvin123",
        "admin": "admin123"
    };

    if (Object.prototype.hasOwnProperty.call(validUsers, username) && validUsers[username] === password) {
        logActivity("User Login", username);
        localStorage.setItem("currentUser", username);
        window.location.href = "dashboard.html";
    } else {
        errorMsg.textContent = "Invalid username or password!";
        logActivity("Failed Login Attempt", username);
    }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
