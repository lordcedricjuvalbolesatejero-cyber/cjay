<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Info System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0fff4; /* light greenish background for page */
        }
        .active-link { font-weight:bold; text-decoration:underline; }
        .card-box { 
            background:#a9fad4;  /* pastel green */
            border:1px solid #6bbb94; 
            text-align:center; 
            padding:20px; 
            border-radius:10px; 
            color:#155724;
        }
        .card-box i { font-size:2rem; margin-bottom:10px; }
        .table-container { max-height:300px; overflow-y:auto; margin-top:20px; }
        .table-hover tbody tr:hover { background-color: #aadfb2; } /* soft hover for table rows */
    </style>
</head> 
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light" style="background-color:#d4edda;">
    <div class="container-fluid">
        <span class="navbar-brand">
            <i class="bi bi-building"></i> Employee Info System
        </span>
        <a href="#" class="btn btn-outline-danger" id="logoutBtn">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</nav>

<!-- Sub-nav / Links -->
<div style="background-color:#9cdbab; border-bottom:1px solid #78ad84;">
    <div class="container py-2">
        <a href="dashboard.html" class="me-3 fw-bold text-dark text-decoration-none" id="nav-dashboard">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="employee_list.html" class="fw-bold text-dark text-decoration-none" id="nav-employees">
            <i class="bi bi-people"></i> Employees
        </a>
    </div>
</div>

<!-- Dashboard Cards -->
<div class="container mt-4">
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card-box">
                <i class="bi bi-people-fill text-success"></i>
                <h2 id="activeCount">0</h2>
                <p>Active Employees</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-box">
                <i class="bi bi-person-badge-fill text-primary"></i>
                <h2 id="permanentCount">0</h2>
                <p>Permanent</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-box">
                <i class="bi bi-person-workspace text-warning"></i>
                <h2 id="temporaryCount">0</h2>
                <p>Temporary</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-box">
                <i class="bi bi-person-x-fill text-danger"></i>
                <h2 id="separatedCount">0</h2>
                <p>Separated</p>
            </div>
        </div>
    </div>

    <!-- Recent Activities -->
    <h4 class="section-title mt-4">
        <i class="bi bi-clock-history"></i> Recent Activities
    </h4>
    <div class="table-container">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Activity</th>
                    <th>Employee</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="activityTable"></tbody>
        </table>
    </div>
</div>

<!-- Load external dashboard JS -->
<script src="./js/dashboard.js" defer></script>
</body>
</html>
