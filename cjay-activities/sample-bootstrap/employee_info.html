<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Info System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/employeeinfo.css">
</head>
<body>

<div class="employee-box container mt-4">
    <h2 class="system-title mb-4">Employee Info System</h2>

    <div class="mb-4">
        <select id="employeeSelect" class="form-select">
            <option selected>Select Employee...</option>
        </select>
    </div>

    <h4 class="mb-4">Employee ID: <span id="empIDDisplay"></span></h4>

    <div class="row">
        <div class="col-md-7">
            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" id="empLast" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" id="empFirst" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Birthday</label>
                <input type="date" id="empBirthday" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select id="empStatus" class="form-select">
                    <option value="Active">Active</option>
                    <option value="Permanent">Permanent</option>
                    <option value="Temporary">Temporary</option>
                    <option value="Separated">Separated</option>
                </select>
            </div>
        </div>

        <div class="col-md-5 d-flex flex-column gap-2 justify-content-end pb-3">
            <button id="trainingsBtn" class="btn btn-success">Trainings</button>
            <button id="serviceBtn" class="btn btn-success">Service Record</button>
            <button id="saveBtn" class="btn btn-primary">Save</button>
            <a href="employee_list.html" class="btn btn-secondary">Back to List</a>
        </div>
    </div>
</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];
let activities = JSON.parse(localStorage.getItem("activities")) || [];

const params = new URLSearchParams(window.location.search);
const empID = params.get('id');
const mode = params.get('mode'); // view, edit, new

// DOM elements
const empLast = document.getElementById('empLast');
const empFirst = document.getElementById('empFirst');
const empBirthday = document.getElementById('empBirthday');
const empStatus = document.getElementById('empStatus');
const saveBtn = document.getElementById('saveBtn');
const employeeSelect = document.getElementById('employeeSelect');
const empIDDisplay = document.getElementById('empIDDisplay');

// Populate dropdown
function populateSelect() {
    employeeSelect.innerHTML = `<option selected>Select Employee...</option>`;
    employees.forEach(e => {
        const opt = document.createElement("option");
        opt.value = e.id;
        opt.text = e.firstName + " " + e.lastName;
        if (e.id === empID) opt.selected = true;
        employeeSelect.appendChild(opt);
    });
}

// Populate form
function populateForm(emp) {
    empIDDisplay.textContent = emp.id;
    empLast.value = emp.lastName;
    empFirst.value = emp.firstName;
    empBirthday.value = emp.birthday || "";
    empStatus.value = emp.status;
    updateStatusColor();
}

// Update status color
function updateStatusColor() {
    empStatus.classList.remove("text-success", "text-primary", "text-warning", "text-danger");
    switch (empStatus.value) {
        case "Active": empStatus.classList.add("text-success"); break;
        case "Permanent": empStatus.classList.add("text-primary"); break;
        case "Temporary": empStatus.classList.add("text-warning"); break;
        case "Separated": empStatus.classList.add("text-danger"); break;
    }
}

populateSelect();

let emp = employees.find(e => e.id === empID);

if (mode === 'new') {
    const nextID = "EMP" + (employees.length + 1).toString().padStart(3, '0');
    empIDDisplay.textContent = nextID;

    empLast.value = "";
    empFirst.value = "";
    empBirthday.value = "";
    empStatus.value = "Active";
    updateStatusColor();

    saveBtn.onclick = function() {
        if (!empLast.value.trim() || !empFirst.value.trim()) {
            return alert("First and Last Name are required!");
        }
        const newEmp = {
            id: nextID, 
            lastName: empLast.value.trim(), 
            firstName: empFirst.value.trim(), 
            birthday: empBirthday.value, 
            status: empStatus.value
        };
        employees.push(newEmp);
        activities.push({
            action: "Added Employee", 
            name: newEmp.firstName + " " + newEmp.lastName, 
            date: new Date().toLocaleString()
        });
        localStorage.setItem("employees", JSON.stringify(employees));
        localStorage.setItem("activities", JSON.stringify(activities));
        window.location.href = "employee_list.html";
    };

} else if (emp) {
    populateForm(emp);
    empStatus.addEventListener("change", updateStatusColor);

    if (mode === 'view') {
        empLast.disabled = true;
        empFirst.disabled = true;
        empBirthday.disabled = true;
        empStatus.disabled = true;
        saveBtn.style.display = 'none';
    } else { // edit mode
        saveBtn.onclick = function() {
            if (!empLast.value.trim() || !empFirst.value.trim()) {
                return alert("First and Last Name are required!");
            }
            emp.lastName = empLast.value.trim();
            emp.firstName = empFirst.value.trim();
            emp.birthday = empBirthday.value;
            emp.status = empStatus.value;
            activities.push({
                action: "Edited Employee", 
                name: emp.firstName + " " + emp.lastName, 
                date: new Date().toLocaleString()
            });
            localStorage.setItem("employees", JSON.stringify(employees));
            localStorage.setItem("activities", JSON.stringify(activities));
            window.location.href = "employee_list.html";
        };
    }
} else if (mode === 'edit') {
    alert("Employee not found!");
    window.location.href = "employee_list.html";
}

// Update form when dropdown changes
employeeSelect.addEventListener("change", () => {
    const selected = employees.find(e => e.id === employeeSelect.value);
    if (selected) {
        // Redirect to view mode of selected employee
        window.location.href = `employee_info.html?id=${selected.id}&mode=${mode || 'view'}`;
    }
});

// Trainings button → pass employee ID and name
document.getElementById('trainingsBtn').onclick = function() {
    if (empIDDisplay.textContent) {
        const fullName = encodeURIComponent(empFirst.value.trim() + " " + empLast.value.trim());
        window.location.href = `trainings.html?id=${empIDDisplay.textContent}&name=${fullName}`;
    } else {
        alert("No employee selected!");
    }
};

// Service Record button → pass employee ID and name
document.getElementById('serviceBtn').onclick = function() {
    if (empIDDisplay.textContent) {
        const fullName = encodeURIComponent(empFirst.value.trim() + " " + empLast.value.trim());
        window.location.href = `service_record.html?id=${empIDDisplay.textContent}&name=${fullName}`;
    } else {
        alert("No employee selected!");
    }
};
</script>

</body>
</html>
