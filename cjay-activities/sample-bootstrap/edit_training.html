<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Training</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #dff5ec; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .navbar { background-color: #ecfdf5 !important; box-shadow: 0 4px 10px rgba(16,185,129,0.15); margin-bottom: 20px; }
        .navbar-brand { font-weight: bold; color: #065f46 !important; }
        .training-box { max-width: 600px; margin: 50px auto; padding: 25px; background:#f0fdf9; border-radius:12px; box-shadow:0 4px 10px rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        label { font-weight:500; color:#065f46; margin-bottom: 6px; }
        input.form-control { background:#e6f6ed; border:1.5px solid rgba(16,185,129,0.3); border-radius:8px; color:#065f46; transition:0.3s;}
        input.form-control:focus { background:#d1f5e3; border-color:#10b981; box-shadow:0 0 8px rgba(16,185,129,0.4); outline:none; }
        .btn-success, .btn-secondary { border-radius:8px; font-weight:600; transition:all 0.3s ease; }
        .btn-success { background: linear-gradient(135deg,#10b981,#34d399); border:none; color:#064e3b; }
        .btn-secondary { background: #d1f5e3; color:#065f46; border:none; }
        .btn-success:hover, .btn-secondary:hover { transform: scale(1.05); box-shadow:0 0 12px rgba(16,185,129,0.3);}
    </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <span class="navbar-brand"><i class="bi bi-building"></i> EMPLOYEE INFO SYSTEM</span>
  </div>
</nav>

<div class="training-box">
    <h2 class="mb-4" id="employeeTitle">Edit Training</h2>
    <form id="editForm">
        <div class="mb-3">
            <label>Training Title</label>
            <input type="text" class="form-control" id="titleInput" required>
        </div>
        <div class="mb-3">
            <label>Training Date</label>
            <input type="date" class="form-control" id="dateInput" required>
        </div>
        <button type="submit" class="btn btn-success">Save Changes</button>
        <button type="button" class="btn btn-secondary" id="backBtn">Back</button>
    </form>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const empID = params.get("id");
const empName = decodeURIComponent(params.get("name") || "");
const index = parseInt(params.get("index"));

if (!empID) {
    alert("Employee ID is missing!");
    window.location.href = "employee_list.html";
}

if (empName) {
    document.getElementById("employeeTitle").textContent = `Edit Training for ${empName}`;
}

let trainingsData = JSON.parse(localStorage.getItem("trainings")) || {};
let trainings = trainingsData[empID] || [];

if (isNaN(index) || !trainings[index]) {
    alert("Training record not found!");
    window.location.href = `trainings.html?id=${empID}&name=${encodeURIComponent(empName)}`;
} else {
    document.getElementById("titleInput").value = trainings[index].title;
    document.getElementById("dateInput").value = trainings[index].date;
}

document.getElementById("editForm").addEventListener("submit", function(e){
    e.preventDefault();
    trainings[index] = {
        title: document.getElementById("titleInput").value.trim(),
        date: document.getElementById("dateInput").value
    };
    trainingsData[empID] = trainings;
    localStorage.setItem("trainings", JSON.stringify(trainingsData));
    window.location.href = `trainings.html?id=${empID}&name=${encodeURIComponent(empName)}`;
});

document.getElementById("backBtn").onclick = () => { 
    window.location.href = `trainings.html?id=${empID}&name=${encodeURIComponent(empName)}`; 
};
</script>

</body>
</html>
