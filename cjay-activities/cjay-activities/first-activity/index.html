<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-box {
            background: rgb(67, 175, 103);
            padding: 20px;
            width: 230px;
            border-radius: 10px;
            border: 4px solid #ccc;
        }

        input, button {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            box-sizing: border-box;
        }

        button {
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h3>LOGIN</h3>
        <label for="username">user name</label>
        <input type="text" id="username" name="username"><br>
        <label for="password">password</label>
        <input type="password" id="password" name="password"><br>
        <button type="submit">LOGIN</button>
    </div>
</body>
</html>
