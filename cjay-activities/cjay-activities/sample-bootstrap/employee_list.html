<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/employee.css">
    <style>
        .active-link { font-weight:bold; text-decoration:underline; }
        .text-success { color:#198754; } 
        .text-primary { color:#0d6efd; } 
        .text-warning { color:#ffc107; } 
        .text-danger { color:#dc3545; }
    </style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html">Employee Info System</a>
        <div>
            <a class="nav-link d-inline" href="dashboard.html" id="nav-dashboard">Dashboard</a>
            <a class="nav-link d-inline" href="employee_list.html" id="nav-employees">Employees</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3>Employees</h3>

    <div class="d-flex mb-3">
        <input type="text" id="employeeSearch" class="form-control w-50" placeholder="Search employee name">
        <button class="btn btn-primary ms-3" onclick="addEmployeePage()"><i class="bi bi-plus-lg"></i> Add</button>
    </div>

    <table class="table table-hover" id="employeeTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Last Name</th>
                <th>First Name</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];
let activities = JSON.parse(localStorage.getItem("activities")) || [];

function renderTable(data) {
    const tbody = document.querySelector("#employeeTable tbody");
    if (!tbody) return;
    tbody.innerHTML = "";
    data.forEach(emp => {
        let statusClass = "";
        switch (emp.status) {
            case "Active": statusClass = "text-success"; break;
            case "Permanent": statusClass = "text-primary"; break;
            case "Temporary": statusClass = "text-warning"; break;
            case "Separated": statusClass = "text-danger"; break;
        }
        tbody.innerHTML += `
            <tr>
                <td>${emp.id}</td>
                <td>${emp.lastName}</td>
                <td>${emp.firstName}</td>
                <td class="${statusClass}">${emp.status}</td>
                <td>
                    <button class="btn btn-sm btn-info" onclick="viewEmployee('${emp.id}')" title="View"><i class="bi bi-eye"></i></button>
                    <button class="btn btn-sm btn-warning" onclick="editEmployee('${emp.id}')" title="Edit"><i class="bi bi-pencil-square"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="deleteEmployee('${emp.id}')" title="Delete"><i class="bi bi-trash"></i></button>
                </td>
            </tr>`;
    });
    // Save updated employees
    localStorage.setItem("employees", JSON.stringify(employees));
}

function addEmployeePage() { 
    window.location.href = "employee_info.html?mode=new"; 
}
function viewEmployee(id) { 
    window.location.href = `employee_info.html?id=${id}&mode=view`; 
}
function editEmployee(id) { 
    window.location.href = `employee_info.html?id=${id}&mode=edit`; 
}

function deleteEmployee(id) {
    if (!confirm("Are you sure you want to delete this employee?")) return;
    const empIndex = employees.findIndex(e => e.id === id);
    if (empIndex === -1) return;
    const emp = employees[empIndex];
    employees.splice(empIndex, 1);
    
    activities.push({
        action: "Deleted Employee", 
        name: emp.firstName + " " + emp.lastName, 
        date: new Date().toLocaleString()
    });
    
    localStorage.setItem("employees", JSON.stringify(employees));
    localStorage.setItem("activities", JSON.stringify(activities));
    renderTable(employees);
}

document.getElementById("employeeSearch").addEventListener("keyup", function() {
    const keyword = this.value.toLowerCase();
    const filtered = employees.filter(emp => 
        emp.firstName.toLowerCase().includes(keyword) || 
        emp.lastName.toLowerCase().includes(keyword)
    );
    renderTable(filtered);
});

// Highlight navbar
const path = window.location.pathname.split("/").pop();
const navDashboard = document.getElementById("nav-dashboard");
const navEmployees = document.getElementById("nav-employees");

if (path === "dashboard.html" && navDashboard) navDashboard.classList.add("active-link");
if (path === "employee_list.html" && navEmployees) navEmployees.classList.add("active-link");

renderTable(employees);
</script>
</body>
</html>
