<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/trainings.css">
</head>
<body>

<div class="training-card">
    <!-- Header -->
    <div class="title-row">
        <h2 id="employeeName">Trainings</h2>
        <div class="d-flex gap-2">
            <div class="search-wrapper">
                <span>🔍</span>
                <input type="text" class="form-control" id="searchInput" placeholder="Search Trainings">
            </div>
            <button class="btn btn-primary" id="addBtn">+ Add Training</button>
            <button class="btn btn-secondary" id="backToInfoBtn">Back</button>
        </div>
    </div>

    <!-- Table -->
    <table class="table training-table mb-0" id="trainingTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr id="emptyRow">
                <td colspan="4" class="text-center text-muted">— no trainings added yet —</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
// URL parameters
const params = new URLSearchParams(window.location.search);
const empID = params.get("id");
const empName = decodeURIComponent(params.get("name") || "");

if (!empID) {
    alert("Employee ID is missing!");
    window.location.href = "employee_list.html";
}

// Show employee name if exists
document.getElementById("employeeName").textContent = empName ? `Trainings for ${empName}` : "Trainings";

// Load trainings
let trainingsData = JSON.parse(localStorage.getItem("trainings")) || {};
if (!trainingsData[empID]) trainingsData[empID] = [];
let trainings = trainingsData[empID];

const tbody = document.getElementById("tableBody");
const searchInput = document.getElementById("searchInput");

// Render table
function renderTable(filter = "") {
    tbody.innerHTML = "";
    const filtered = trainings.filter(t => 
        t.title.toLowerCase().includes(filter.toLowerCase()) ||
        t.date.includes(filter)
    );

    if (filtered.length === 0) {
        tbody.innerHTML = `<tr id="emptyRow"><td colspan="4" class="text-center text-muted">— no trainings found —</td></tr>`;
        return;
    }

    filtered.forEach((t, idx) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${idx + 1}</td>
            <td>${t.title}</td>
            <td>${t.date}</td>
            <td>
                <button class="btn btn-sm btn-warning editBtn">Edit</button>
                <button class="btn btn-sm btn-danger deleteBtn">Delete</button>
            </td>
        `;

        // Delete button
        tr.querySelector(".deleteBtn").onclick = () => {
            if (confirm("Are you sure you want to delete this training record?")) {
                const realIndex = trainings.indexOf(t);
                trainings.splice(realIndex, 1);
                saveAndRender();
            }
        };

        // Edit button
        tr.querySelector(".editBtn").onclick = () => {
            window.location.href = `edit_training.html?id=${empID}&index=${trainings.indexOf(t)}&name=${encodeURIComponent(empName)}`;
        };

        tbody.appendChild(tr);
    });
}

// Save and rerender
function saveAndRender() {
    trainingsData[empID] = trainings;
    localStorage.setItem("trainings", JSON.stringify(trainingsData));
    renderTable(searchInput.value);
}

// Initial render
renderTable();

// Search input
searchInput.addEventListener("input", () => {
    renderTable(searchInput.value);
});

// Add Training button
document.getElementById("addBtn").onclick = function() {
    window.location.href = `add_training.html?id=${empID}&name=${encodeURIComponent(empName)}`;
};

// Back button to Employee Info
document.getElementById("backToInfoBtn").onclick = function() {
    window.location.href = `employee_info.html?id=${empID}&mode=edit`;
};
</script>

</body>
</html>
