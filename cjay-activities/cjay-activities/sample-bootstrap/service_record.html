<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/service.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <span class="navbar-brand"><i class="bi bi-building"></i> EMPLOYEE INFO SYSTEM</span>
  </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" id="employeeTitle">Service Record</h2>
        <div>
            <button class="btn btn-primary" id="addServiceBtn"><i class="bi bi-plus-circle"></i> Add</button>
            <button class="btn btn-secondary" id="backToInfoBtn">Back</button>
        </div>
    </div>

    <div class="mb-3">
        <input type="text" class="form-control w-25" id="searchService" placeholder="Search...">
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="serviceTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Position</th>
                            <th>Start</th>
                            <th>End</th>
                            <th width="150">Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// Get employee ID and name from URL
const params = new URLSearchParams(window.location.search);
const empID = params.get("id");
const empName = decodeURIComponent(params.get("name") || "");

if (!empID) {
    alert("Employee ID is missing!");
    window.location.href = "employee_list.html";
}

document.getElementById("employeeTitle").textContent = empName ? `Service Record for ${empName}` : "Service Record";

let servicesData = JSON.parse(localStorage.getItem("services")) || {};
if (!servicesData[empID]) servicesData[empID] = []; // employee-specific record key
let services = servicesData[empID];

const serviceTableBody = document.querySelector("#serviceTable tbody");
const searchInput = document.getElementById("searchService");

function renderTable(filter = "") {
    serviceTableBody.innerHTML = "";
    const filtered = services.filter(s => 
        s.position.toLowerCase().includes(filter.toLowerCase()) ||
        s.start.includes(filter) ||
        s.end.includes(filter)
    );

    if (filtered.length === 0) {
        serviceTableBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">— no service records found —</td></tr>`;
        return;
    }

    filtered.forEach((s, idx) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${idx + 1}</td>
            <td>${s.position}</td>
            <td>${s.start}</td>
            <td>${s.end}</td>
            <td>
                <button class="btn btn-sm btn-warning editBtn">Edit</button>
                <button class="btn btn-sm btn-danger deleteBtn">Delete</button>
            </td>
        `;

        tr.querySelector(".deleteBtn").onclick = () => {
            if (confirm("Are you sure you want to delete this service record?")) {
                const realIndex = services.indexOf(s);
                services.splice(realIndex, 1);
                servicesData[empID] = services;
                localStorage.setItem("services", JSON.stringify(servicesData));
                renderTable(searchInput.value);
            }
        };

        tr.querySelector(".editBtn").onclick = () => {
            window.location.href = `edit_service.html?id=${empID}&index=${services.indexOf(s)}&name=${encodeURIComponent(empName)}`;
        };

        serviceTableBody.appendChild(tr);
    });
}

searchInput.addEventListener("input", () => renderTable(searchInput.value));

document.getElementById("addServiceBtn").onclick = () => {
    window.location.href = `add_service.html?id=${empID}&name=${encodeURIComponent(empName)}`;
};

document.getElementById("backToInfoBtn").onclick = () => {
    window.location.href = `employee_info.html?id=${empID}&mode=edit`;
};

renderTable();
</script>

</body>
</html>
